<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>bring4U — Demo Site</title>
  <style>
    :root {
      --bg: #fdfaf6;
      --ink: #1f1b16;
      --accent: #b91c1c;
      --muted: #8a7f74;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: "Hiragino Sans", "Yu Gothic", "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 560px;
      text-align: center;
      padding: 48px 32px;
      border: 1px solid #ece4d7;
      border-radius: 12px;
      background: #ffffff;
      box-shadow: 0 8px 30px rgba(31, 27, 22, 0.05);
    }
    .badge {
      display: inline-block;
      font-size: 12px;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 28px;
      line-height: 1.4;
      margin-bottom: 12px;
    }
    h1 .jp { color: var(--accent); }
    p {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
      margin-bottom: 24px;
    }
    .meta {
      font-size: 12px;
      color: var(--muted);
      border-top: 1px solid #ece4d7;
      padding-top: 16px;
    }
    .meta code {
      background: #f5efe5;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">bring4U</div>
    <h1>Hello, <span class="jp">日本</span>.</h1>
    <p>これはデモサイトです。<br />
    Bitbucket → Vercel 自動デプロイのテストページ。</p>
    <div class="meta">
      Deployed via <code>Vercel</code> · Source on <code>Bitbucket</code>
    </div>
  </main>
</body>
</html>
